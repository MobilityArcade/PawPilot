<!DOCTYPE html>
<html>
<head>
  <title>PawPilot</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 { margin-top: 20px; font-size: 42px; }

    .camera-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: auto;
    }

    video, canvas {
      width: 100%;
      border-radius: 14px;
      position: absolute;
      top: 0;
      left: 0;
    }

    video {
      position: relative;
      z-index: 1;
    }

    canvas { z-index: 2; }

    #coachOverlay {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 20px;
      font-weight: bold;
      background: rgba(0,0,0,0.65);
      z-index: 3;
    }

    #status { margin-top: 20px; font-size: 18px; }

    .pill {
      display: inline-block;
      margin-top: 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 8px 14px;
      border-radius: 999px;
      margin-right: 8px;
    }

    button {
      margin-top: 15px;
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: gold;
      color: black;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <h1>🐾 PawPilot</h1>
  <p>Real-Time Dog Training Coach</p>

  <div class="camera-container">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="coachOverlay">Starting...</div>
  </div>

  <button onclick="switchCamera()">🔄 Switch Camera</button>

  <div id="status">Loading...</div>

  <div>
    <span class="pill">Camera: <span id="cameraMode">Back</span></span>
    <span class="pill">Dog: <span id="dogStatus">No</span></span>
    <span class="pill">Person: <span id="personStatus">No</span></span>
  </div>

  <script>
    const video = document.getElementById("camera");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    const coachOverlay = document.getElementById("coachOverlay");
    const statusText = document.getElementById("status");
    const dogStatus = document.getElementById("dogStatus");
    const personStatus = document.getElementById("personStatus");
    const cameraModeText = document.getElementById("cameraMode");

    let model;
    let currentStream = null;
    let currentFacingMode = "environment";

    let voiceReady = false;
    let lastSpoken = "";

    document.body.addEventListener("click", () => {
      const unlock = new SpeechSynthesisUtterance("");
      speechSynthesis.speak(unlock);
      speechSynthesis.cancel();
      voiceReady = true;
    }, { once: true });

    function speak(text) {
      if (!voiceReady) return;
      if (text === lastSpoken) return;

      lastSpoken = text;
      speechSynthesis.cancel();

      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1;
      utter.pitch = 1;

      speechSynthesis.speak(utter);
    }

    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }

      statusText.innerText = "Starting Camera...";

      try {
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode },
          audio: false
        });

        video.srcObject = currentStream;

        cameraModeText.innerText =
          currentFacingMode === "environment" ? "Back" : "Front";

        return new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });

      } catch (err) {
        console.error("Camera error:", err);
        statusText.innerText = "Camera error. Try switching camera.";
      }
    }

    async function switchCamera() {
      currentFacingMode =
        currentFacingMode === "environment" ? "user" : "environment";

      coachOverlay.innerText = "Switching camera...";
      coachOverlay.style.color = "white";
      await startCamera();
    }

    async function init() {
      await startCamera();

      statusText.innerText = "Loading AI Model...";
      model = await cocoSsd.load();

      statusText.innerText = "AI Ready";
      detect();
    }

    async function detect() {
      if (!model || video.readyState < 2) {
        requestAnimationFrame(detect);
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const predictions = await model.detect(video);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let dog = null;
      let person = null;

      predictions.forEach(prediction => {
        if (prediction.score > 0.55) {
          const [x, y, w, h] = prediction.bbox;

          ctx.strokeStyle = "lime";
          ctx.lineWidth = 3;
          ctx.strokeRect(x, y, w, h);

          ctx.fillStyle = "lime";
          ctx.font = "18px Arial";
          ctx.fillText(prediction.class, x, y > 15 ? y - 8 : 20);

          if (prediction.class === "dog") dog = prediction.bbox;
          if (prediction.class === "person") person = prediction.bbox;
        }
      });

      dogStatus.innerText = dog ? "YES" : "NO";
      personStatus.innerText = person ? "YES" : "NO";

      if (dog && person) {
        const distance = Math.abs(dog[0] - person[0]);

        if (distance > 150) {
          coachOverlay.innerText = "🛑 STOP";
          coachOverlay.style.color = "red";
          speak("Stop");
        } else if (distance > 70) {
          coachOverlay.innerText = "⚠️ Slow";
          coachOverlay.style.color = "orange";
          speak("Slow down");
        } else {
          coachOverlay.innerText = "✅ Good";
          coachOverlay.style.color = "lime";
          speak("Good");
        }

      } else if (dog) {
        coachOverlay.innerText = "🐶 Dog detected";
        coachOverlay.style.color = "cyan";
      } else {
        coachOverlay.innerText = "👀 Looking for dog";
        coachOverlay.style.color = "white";
      }

      requestAnimationFrame(detect);
    }

    init();
  </script>

</body>
</html>
