<!DOCTYPE html>
<html>
<head>
  <title>PawPilot</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 44px;
    }

    .subtitle {
      color: #ccc;
      margin-bottom: 18px;
      font-size: 18px;
    }

    .mode-box {
      margin: 10px auto 20px;
    }

    select {
      padding: 12px 16px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      background: gold;
      color: black;
    }

    .camera-container {
      position: relative;
      width: 100%;
      max-width: 420px;
      margin: auto;
    }

    video,
    canvas {
      width: 100%;
      border-radius: 16px;
      position: absolute;
      top: 0;
      left: 0;
    }

    video {
      position: relative;
      z-index: 1;
    }

    canvas {
      z-index: 2;
    }

    #coachOverlay {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 24px;
      font-weight: bold;
      background: rgba(0, 0, 0, 0.7);
      z-index: 3;
    }

    button {
      margin-top: 18px;
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: gold;
      color: black;
      font-weight: bold;
      font-size: 16px;
    }

    #status {
      margin-top: 18px;
      font-size: 18px;
    }

    .pill {
      display: inline-block;
      margin-top: 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 9px 14px;
      border-radius: 999px;
      margin-right: 6px;
      margin-left: 6px;
      font-size: 15px;
    }

    #modeHint {
      color: #aaa;
      max-width: 420px;
      margin: 14px auto 0;
      line-height: 1.4;
      font-size: 15px;
    }
  </style>
</head>

<body>

  <h1>🐾 PawPilot</h1>
  <div class="subtitle">Real-Time Dog Training Coach</div>

  <div class="mode-box">
    <select id="trainingMode" onchange="changeMode()">
      <option value="looseLeash">Loose Leash Walking</option>
      <option value="heel">Heel Training</option>
      <option value="stay">Stay / Wait</option>
      <option value="focus">Focus</option>
    </select>
  </div>

  <div class="camera-container">
    <video id="camera" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="coachOverlay">Starting...</div>
  </div>

  <button onclick="switchCamera()">🔄 Switch Camera</button>

  <div id="status">Loading...</div>

  <div>
    <span class="pill">Camera: <span id="cameraMode">Back</span></span>
    <span class="pill">Dog: <span id="dogStatus">NO</span></span>
    <span class="pill">Person: <span id="personStatus">NO</span></span>
  </div>

  <div id="modeHint">
    Mode: Loose leash. PawPilot says “Good” when the dog stays close and “Stop” when the dog pulls too far ahead.
  </div>

  <script>
    const video = document.getElementById("camera");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    const coachOverlay = document.getElementById("coachOverlay");
    const statusText = document.getElementById("status");
    const dogStatus = document.getElementById("dogStatus");
    const personStatus = document.getElementById("personStatus");
    const cameraModeText = document.getElementById("cameraMode");
    const trainingModeSelect = document.getElementById("trainingMode");
    const modeHint = document.getElementById("modeHint");

    let model;
    let currentStream = null;
    let currentFacingMode = "environment";

    let voiceReady = false;
    let lastSpoken = "";
    let currentCue = "";

    document.body.addEventListener("click", () => {
      const unlock = new SpeechSynthesisUtterance("");
      speechSynthesis.speak(unlock);
      speechSynthesis.cancel();
      voiceReady = true;
    }, { once: true });

    function speak(text) {
      if (!voiceReady) return;
      if (text === lastSpoken) return;

      lastSpoken = text;
      speechSynthesis.cancel();

      const utter = new SpeechSynthesisUtterance(text);
      utter.rate = 1;
      utter.pitch = 1;
      speechSynthesis.speak(utter);
    }

    function setCue(text, color, spokenText) {
      coachOverlay.innerText = text;
      coachOverlay.style.color = color;

      if (spokenText && spokenText !== currentCue) {
        currentCue = spokenText;
        speak(spokenText);
      }
    }

    async function startCamera() {
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
      }

      statusText.innerText = "Starting Camera...";

      try {
        currentStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: currentFacingMode },
          audio: false
        });

        video.srcObject = currentStream;

        cameraModeText.innerText =
          currentFacingMode === "environment" ? "Back" : "Front";

        return new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
      } catch (err) {
        console.error("Camera error:", err);
        statusText.innerText = "Camera error. Try switching camera.";
      }
    }

    async function switchCamera() {
      currentFacingMode =
        currentFacingMode === "environment" ? "user" : "environment";

      setCue("Switching camera...", "white", "");
      await startCamera();
    }

    function changeMode() {
      lastSpoken = "";
      currentCue = "";

      const mode = trainingModeSelect.value;

      if (mode === "looseLeash") {
        modeHint.innerText =
          "Mode: Loose leash. PawPilot says “Good” when the dog stays close and “Stop” when the dog pulls too far ahead.";
      }

      if (mode === "heel") {
        modeHint.innerText =
          "Mode: Heel training. PawPilot says “Good” when the dog stays close to the handler. Use this for walking beside you.";
      }

      if (mode === "stay") {
        modeHint.innerText =
          "Mode: Stay / Wait. PawPilot watches whether the dog stays mostly still. This is an early MVP version.";
      }

      if (mode === "focus") {
        modeHint.innerText =
          "Mode: Focus. PawPilot rewards calm closeness and attention. This is an early MVP version.";
      }
    }

    async function init() {
      await startCamera();

      statusText.innerText = "Loading AI Model...";
      model = await cocoSsd.load();

      statusText.innerText = "AI Ready";
      detect();
    }

    async function detect() {
      if (!model || video.readyState < 2) {
        requestAnimationFrame(detect);
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const predictions = await model.detect(video);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let dog = null;
      let person = null;

      predictions.forEach(prediction => {
        if (prediction.score > 0.55) {
          const [x, y, w, h] = prediction.bbox;

          if (prediction.class === "dog" || prediction.class === "person") {
            ctx.strokeStyle = prediction.class === "dog" ? "lime" : "#00ffff";
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);

            ctx.fillStyle = prediction.class === "dog" ? "lime" : "#00ffff";
            ctx.font = "18px Arial";
            ctx.fillText(prediction.class, x, y > 15 ? y - 8 : 20);
          }

          if (prediction.class === "dog") dog = prediction.bbox;
          if (prediction.class === "person") person = prediction.bbox;
        }
      });

      dogStatus.innerText = dog ? "YES" : "NO";
      personStatus.innerText = person ? "YES" : "NO";

      const mode = trainingModeSelect.value;

      if (!dog) {
        setCue("👀 Looking for dog", "white", "Find your dog");
      } else if (mode === "looseLeash") {
        looseLeashLogic(dog, person);
      } else if (mode === "heel") {
        heelLogic(dog, person);
      } else if (mode === "stay") {
        stayLogic(dog);
      } else if (mode === "focus") {
        focusLogic(dog, person);
      }

      requestAnimationFrame(detect);
    }

    function looseLeashLogic(dog, person) {
      if (!person) {
        setCue("🐶 Dog detected", "cyan", "");
        return;
      }

      const distance = Math.abs(dog[0] - person[0]);

      if (distance > 135) {
        setCue("🛑 STOP", "red", "Stop");
      } else {
        setCue("✅ GOOD", "lime", "Good");
      }
    }

    function heelLogic(dog, person) {
      if (!person) {
        setCue("🐶 Dog detected", "cyan", "");
        return;
      }

      const distance = Math.abs(dog[0] - person[0]);

      if (distance < 95) {
        setCue("✅ HEEL", "lime", "Good");
      } else {
        setCue("🛑 RESET", "red", "Reset");
      }
    }

    let lastDogX = null;
    let stillFrames = 0;

    function stayLogic(dog) {
      const dogX = dog[0];

      if (lastDogX === null) {
        lastDogX = dogX;
        setCue("⏳ WAIT", "orange", "Wait");
        return;
      }

      const movement = Math.abs(dogX - lastDogX);

      if (movement < 8) {
        stillFrames++;
      } else {
        stillFrames = 0;
      }

      lastDogX = dogX;

      if (stillFrames > 40) {
        setCue("✅ GOOD STAY", "lime", "Good");
      } else {
        setCue("⏳ WAIT", "orange", "Wait");
      }
    }

    function focusLogic(dog, person) {
      if (!person) {
        setCue("🐶 Dog detected", "cyan", "");
        return;
      }

      const distance = Math.abs(dog[0] - person[0]);

      if (distance < 120) {
        setCue("✅ FOCUS", "lime", "Good");
      } else {
        setCue("👀 COME CLOSE", "orange", "Focus");
      }
    }

    init();
  </script>

</body>
</html>
