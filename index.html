<!DOCTYPE html>
<html>
<head>
  <title>PawPilot</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #ccc;
      font-size: 18px;
      margin-bottom: 18px;
    }

    select,
    button {
      background: gold;
      color: black;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: bold;
      margin: 8px;
    }

    .camera-container {
      position: relative;
      width: 100%;
      max-width: 430px;
      margin: 18px auto;
    }

    video,
    canvas {
      width: 100%;
      border-radius: 18px;
      position: absolute;
      top: 0;
      left: 0;
    }

    video {
      position: relative;
      z-index: 1;
    }

    canvas {
      z-index: 2;
    }

    #coachOverlay {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 26px;
      font-weight: bold;
      background: rgba(0,0,0,0.7);
      z-index: 3;
    }

    .pill {
      display: inline-block;
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 9px 14px;
      border-radius: 999px;
      margin: 6px;
      font-size: 15px;
    }

    #guidedBox {
      max-width: 430px;
      margin: 20px auto;
      background: #111;
      border: 1px solid #333;
      border-radius: 18px;
      padding: 22px;
      display: none;
    }

    #guidedStep {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    #guidedInstruction {
      font-size: 20px;
      line-height: 1.6;
      color: #ddd;
      margin-bottom: 18px;
    }

    #progress {
      color: #aaa;
      margin-top: 12px;
      font-size: 15px;
    }

    #modeHint {
      max-width: 430px;
      margin: 14px auto;
      color: #aaa;
      line-height: 1.5;
      font-size: 15px;
    }
  </style>
</head>

<body>

  <h1>🐾 PawPilot</h1>

  <div class="subtitle">
    Real-Time Dog Training Coach
  </div>

  <select id="trainingMode" onchange="changeMode()">

    <option value="looseLeash">
      Loose Leash Walking
    </option>

    <option value="heel">
      Heel Training
    </option>

    <option value="stay">
      Stay / Wait
    </option>

    <option value="focus">
      Focus
    </option>

    <option value="sit">
      Sit Training
    </option>

    <option value="down">
      Down Training
    </option>

    <option value="dropIt">
      Drop It
    </option>

    <option value="leaveIt">
      Leave It
    </option>

  </select>

  <!-- CAMERA SECTION -->

  <div id="cameraSection">

    <div class="camera-container">

      <video
        id="camera"
        autoplay
        playsinline
        muted>
      </video>

      <canvas id="overlay"></canvas>

      <div id="coachOverlay">
        Starting...
      </div>

    </div>

    <button onclick="switchCamera()">
      🔄 Switch Camera
    </button>

    <div>

      <span class="pill">
        Camera:
        <span id="cameraMode">Back</span>
      </span>

      <span class="pill">
        Dog:
        <span id="dogStatus">NO</span>
      </span>

      <span class="pill">
        Person:
        <span id="personStatus">NO</span>
      </span>

    </div>

  </div>

  <!-- GUIDED TRAINING -->

  <div id="guidedBox">

    <div id="guidedStep">
      Step 1
    </div>

    <div id="guidedInstruction">
      Loading...
    </div>

    <button onclick="markSuccess()">
      ✅ Success
    </button>

    <button onclick="markTryAgain()">
      ↩️ Try Again
    </button>

    <button onclick="resetGuided()">
      🔁 Reset
    </button>

    <div id="progress">
      Progress
    </div>

  </div>

  <div id="modeHint"></div>

  <script>

    // ==========================
    // ELEMENTS
    // ==========================

    const video =
      document.getElementById("camera");

    const canvas =
      document.getElementById("overlay");

    const ctx =
      canvas.getContext("2d");

    const coachOverlay =
      document.getElementById("coachOverlay");

    const dogStatus =
      document.getElementById("dogStatus");

    const personStatus =
      document.getElementById("personStatus");

    const cameraModeText =
      document.getElementById("cameraMode");

    const trainingModeSelect =
      document.getElementById("trainingMode");

    const cameraSection =
      document.getElementById("cameraSection");

    const guidedBox =
      document.getElementById("guidedBox");

    const guidedStep =
      document.getElementById("guidedStep");

    const guidedInstruction =
      document.getElementById("guidedInstruction");

    const progressText =
      document.getElementById("progress");

    const modeHint =
      document.getElementById("modeHint");

    // ==========================
    // VARIABLES
    // ==========================

    let model;

    let currentStream = null;

    let currentFacingMode =
      "environment";

    let voiceReady = false;

    let lastSpoken = "";

    let currentCue = "";

    // ==========================
    // VOICE
    // ==========================

    document.body.addEventListener("click", () => {

      const unlock =
        new SpeechSynthesisUtterance("");

      speechSynthesis.speak(unlock);

      speechSynthesis.cancel();

      voiceReady = true;

    }, { once: true });

    function speak(text) {

      if (!voiceReady || !text) return;

      if (text === lastSpoken) return;

      lastSpoken = text;

      speechSynthesis.cancel();

      const utter =
        new SpeechSynthesisUtterance(text);

      utter.rate = 1;
      utter.pitch = 1;

      speechSynthesis.speak(utter);
    }

    function setCue(text, color, spokenText) {

      coachOverlay.innerText = text;

      coachOverlay.style.color = color;

      if (
        spokenText &&
        spokenText !== currentCue
      ) {

        currentCue = spokenText;

        speak(spokenText);
      }
    }

    // ==========================
    // CAMERA
    // ==========================

    async function startCamera() {

      if (currentStream) {

        currentStream
          .getTracks()
          .forEach(track => track.stop());
      }

      currentStream =
        await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: currentFacingMode
          },
          audio: false
        });

      video.srcObject = currentStream;

      cameraModeText.innerText =
        currentFacingMode === "environment"
          ? "Back"
          : "Front";

      return new Promise(resolve => {

        video.onloadedmetadata = () => {

          video.play();

          resolve();
        };

      });
    }

    function stopCamera() {

      if (currentStream) {

        currentStream
          .getTracks()
          .forEach(track => track.stop());

        currentStream = null;
      }
    }

    async function switchCamera() {

      currentFacingMode =
        currentFacingMode === "environment"
          ? "user"
          : "environment";

      await startCamera();
    }

    // ==========================
    // GUIDED TRAINING
    // ==========================

    let guidedIndex = 0;

    let guidedRound = 1;

    const totalRounds = 3;

    let successCount = 0;

    let totalAttempts = 0;

    let sessionStartTime = null;

    const guidedModes = [
      "sit",
      "down",
      "dropIt",
      "leaveIt"
    ];

    const guidedPlans = {

      sit: [
        "Hold a treat close to your dog’s nose.",
        "Slowly lift the treat upward and slightly back.",
        "When your dog’s bottom touches the ground, mark it with Yes.",
        "Reward immediately."
      ],

      down: [
        "Ask your dog to sit first.",
        "Move the treat slowly from the nose down to the floor.",
        "When elbows lower toward the ground, mark it with Yes.",
        "Reward calmly."
      ],

      dropIt: [
        "Offer your dog a toy.",
        "Show a better treat near their nose.",
        "When they release the toy, say Drop.",
        "Reward and return the toy."
      ],

      leaveIt: [
        "Place a treat in your closed hand.",
        "Wait calmly while your dog investigates.",
        "When they stop trying, mark with Yes.",
        "Reward from the other hand."
      ]
    };

    function startSessionTimer() {

      sessionStartTime =
        Date.now();
    }

    function getSessionDuration() {

      const elapsed =
        Math.floor(
          (Date.now() - sessionStartTime) / 1000
        );

      const minutes =
        Math.floor(elapsed / 60);

      const seconds =
        elapsed % 60;

      return `${minutes}m ${seconds}s`;
    }

    function getConsistencyScore() {

      if (totalAttempts === 0)
        return 100;

      return Math.round(
        (successCount / totalAttempts) * 100
      );
    }

    function loadGuidedStep() {

      const mode =
        trainingModeSelect.value;

      const steps =
        guidedPlans[mode];

      guidedStep.innerText =
        "Round " +
        guidedRound +
        " • Step " +
        (guidedIndex + 1);

      guidedInstruction.innerText =
        steps[guidedIndex];

      progressText.innerText =
        "Completed Rounds: " +
        (guidedRound - 1) +
        " / " +
        totalRounds;

      speak(steps[guidedIndex]);
    }

    function markSuccess() {

      totalAttempts++;

      successCount++;

      const mode =
        trainingModeSelect.value;

      const steps =
        guidedPlans[mode];

      speak("Good");

      guidedIndex++;

      // Completed all steps
      if (guidedIndex >= steps.length) {

        guidedIndex = 0;

        // Completed all rounds
        if (guidedRound >= totalRounds) {

          showCompletionScreen();

          return;
        }

        guidedRound++;

        speak(
          "Great. Begin next round."
        );
      }

      loadGuidedStep();
    }

    function markTryAgain() {

      totalAttempts++;

      speak("Try again");
    }

    function resetGuided() {

      guidedIndex = 0;

      guidedRound = 1;

      successCount = 0;

      totalAttempts = 0;

      startSessionTimer();

      loadGuidedStep();

      speak("Training reset");
    }

    function showCompletionScreen() {

      const modeName =
        trainingModeSelect.options[
          trainingModeSelect.selectedIndex
        ].text;

      guidedStep.innerText =
        "🎉 SESSION COMPLETE";

      guidedInstruction.innerHTML = `
        <div style="line-height:1.8;">
          <strong>Mode:</strong> ${modeName}<br>
          <strong>Rounds Completed:</strong> ${totalRounds}<br>
          <strong>Session Time:</strong> ${getSessionDuration()}<br>
          <strong>Consistency:</strong> ${getConsistencyScore()}%
        </div>

        <br>

        Great work today.
      `;

      progressText.innerText =
        "Training Complete";

      speak(
        "Great work today. Training complete."
      );
    }

    // ==========================
    // MODE CHANGES
    // ==========================

    function changeMode() {

      lastSpoken = "";

      currentCue = "";

      guidedIndex = 0;

      guidedRound = 1;

      successCount = 0;

      totalAttempts = 0;

      const mode =
        trainingModeSelect.value;

      if (guidedModes.includes(mode)) {

        stopCamera();

        cameraSection.style.display =
          "none";

        guidedBox.style.display =
          "block";

        startSessionTimer();

        loadGuidedStep();

        modeHint.innerText =
          "Guided mode: complete the full sequence for 3 rounds.";

      } else {

        guidedBox.style.display =
          "none";

        cameraSection.style.display =
          "block";

        startCamera();

        if (mode === "looseLeash") {

          modeHint.innerText =
            "Loose leash mode: PawPilot says GOOD when the dog stays close and STOP when the leash becomes tight.";
        }

        if (mode === "heel") {

          modeHint.innerText =
            "Heel mode: PawPilot rewards close walking beside the handler.";
        }

        if (mode === "stay") {

          modeHint.innerText =
            "Stay mode: PawPilot watches for stillness and rewards calm waiting.";
        }

        if (mode === "focus") {

          modeHint.innerText =
            "Focus mode: PawPilot rewards calm closeness and attention.";
        }
      }
    }

    // ==========================
    // INIT
    // ==========================

    async function init() {

      await startCamera();

      model =
        await cocoSsd.load();

      changeMode();

      detect();
    }

    // ==========================
    // DETECTION LOOP
    // ==========================

    async function detect() {

      const mode =
        trainingModeSelect.value;

      if (guidedModes.includes(mode)) {

        requestAnimationFrame(detect);

        return;
      }

      if (
        !model ||
        !currentStream ||
        video.readyState < 2
      ) {

        requestAnimationFrame(detect);

        return;
      }

      canvas.width =
        video.videoWidth;

      canvas.height =
        video.videoHeight;

      const predictions =
        await model.detect(video);

      ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
      );

      let dog = null;

      let person = null;

      predictions.forEach(prediction => {

        if (prediction.score > 0.55) {

          const [x, y, w, h] =
            prediction.bbox;

          if (
            prediction.class === "dog" ||
            prediction.class === "person"
          ) {

            ctx.strokeStyle =
              prediction.class === "dog"
                ? "lime"
                : "#00ffff";

            ctx.lineWidth = 3;

            ctx.strokeRect(
              x,
              y,
              w,
              h
            );

            ctx.fillStyle =
              prediction.class === "dog"
                ? "lime"
                : "#00ffff";

            ctx.font =
              "18px Arial";

            ctx.fillText(
              prediction.class,
              x,
              y > 15 ? y - 8 : 20
            );
          }

          if (
            prediction.class === "dog"
          ) {
            dog = prediction.bbox;
          }

          if (
            prediction.class === "person"
          ) {
            person = prediction.bbox;
          }
        }
      });

      dogStatus.innerText =
        dog ? "YES" : "NO";

      personStatus.innerText =
        person ? "YES" : "NO";

      if (!dog || !person) {

        setCue("", "white", "");

      } else if (
        mode === "looseLeash"
      ) {

        looseLeashLogic(
          dog,
          person
        );

      } else if (
        mode === "heel"
      ) {

        heelLogic(
          dog,
          person
        );

      } else if (
        mode === "stay"
      ) {

        stayLogic(dog);

      } else if (
        mode === "focus"
      ) {

        focusLogic(
          dog,
          person
        );
      }

      requestAnimationFrame(detect);
    }

    // ==========================
    // CAMERA MODES
    // ==========================

    function looseLeashLogic(
      dog,
      person
    ) {

      const distance =
        Math.abs(
          dog[0] - person[0]
        );

      if (distance > 135) {

        setCue(
          "🛑 STOP",
          "red",
          "Stop"
        );

      } else {

        setCue(
          "✅ GOOD",
          "lime",
          "Good"
        );
      }
    }

    function heelLogic(
      dog,
      person
    ) {

      const distance =
        Math.abs(
          dog[0] - person[0]
        );

      if (distance < 95) {

        setCue(
          "✅ HEEL",
          "lime",
          "Good"
        );

      } else {

        setCue(
          "🛑 RESET",
          "red",
          "Reset"
        );
      }
    }

    let lastDogX = null;

    let stillFrames = 0;

    function stayLogic(dog) {

      const dogX = dog[0];

      if (lastDogX === null) {

        lastDogX = dogX;

        setCue(
          "⏳ WAIT",
          "orange",
          "Wait"
        );

        return;
      }

      const movement =
        Math.abs(
          dogX - lastDogX
        );

      if (movement < 8) {

        stillFrames++;

      } else {

        stillFrames = 0;
      }

      lastDogX = dogX;

      if (stillFrames > 40) {

        setCue(
          "✅ GOOD STAY",
          "lime",
          "Good"
        );

      } else {

        setCue(
          "⏳ WAIT",
          "orange",
          "Wait"
        );
      }
    }

    function focusLogic(
      dog,
      person
    ) {

      const distance =
        Math.abs(
          dog[0] - person[0]
        );

      if (distance < 120) {

        setCue(
          "✅ FOCUS",
          "lime",
          "Good"
        );

      } else {

        setCue(
          "",
          "white",
          ""
        );
      }
    }

    init();

  </script>

</body>
</html>
